<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Promo — Theme-Aware Example Scene</title>

<!--
  ============================================================================
  PODCAST PROMO — example of a completely different video format
  ============================================================================

  This scene demonstrates how a different video format looks:
    - 3 scenes instead of 8 (intro / value prop / CTA)
    - Slower pacing (no rapid cuts)
    - Editorial typography (Playfair Display serif)
    - Dust particles instead of sparks
    - Quote-driven (not feature-driven)

  It's fully theme-aware — try it with different themes:
    --theme themes/PodcastTheme.js   (warm, intimate)
    --theme themes/ForgeTheme.js     (dark, fiery — totally different vibe)
    --theme themes/MinimalTheme.js   (bare bones)
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:wght@400;600&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1920px;
    overflow: hidden;
    background: var(--bg, #f4ecd8);
    color: var(--fg, #2a1810);
    font-family: var(--font-body, 'Crimson Text', serif);
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: var(--pad, 100px);
    opacity: 0;
  }

  /* Scene 1: Quote */
  .quote-mark {
    font-family: var(--font-display, 'Playfair Display', serif);
    font-size: 240px;
    line-height: 0.5;
    color: var(--accent, #7a1f2b);
    opacity: 0;
    margin-bottom: 40px;
  }
  .quote-text {
    font-family: var(--font-display, 'Playfair Display', serif);
    font-weight: 700;
    font-size: 88px;
    line-height: 1.15;
    text-align: center;
    letter-spacing: -1px;
  }
  .quote-text .word {
    display: inline-block;
    opacity: 0;
  }
  .quote-text .em {
    color: var(--accent, #7a1f2b);
    font-style: italic;
  }
  .quote-attr {
    margin-top: 60px;
    font-family: var(--font-mono, monospace);
    font-size: 28px;
    color: var(--muted, rgba(42,24,16,0.6));
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
  }

  /* Scene 2: Show title */
  .show-eyebrow {
    font-family: var(--font-mono, monospace);
    font-size: 30px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--accent, #7a1f2b);
    margin-bottom: 50px;
    opacity: 0;
  }
  .show-title {
    font-family: var(--font-display, 'Playfair Display', serif);
    font-weight: 900;
    font-size: 180px;
    line-height: 0.95;
    text-align: center;
    letter-spacing: -4px;
  }
  .show-title .word {
    display: inline-block;
    opacity: 0;
  }
  .show-tagline {
    margin-top: 50px;
    font-size: 42px;
    font-style: italic;
    color: var(--muted, rgba(42,24,16,0.7));
    text-align: center;
    opacity: 0;
    max-width: 800px;
  }

  /* Scene 3: CTA */
  .cta-eyebrow {
    font-family: var(--font-mono, monospace);
    font-size: 28px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent, #7a1f2b);
    margin-bottom: 50px;
    opacity: 0;
  }
  .cta-headline {
    font-family: var(--font-display, 'Playfair Display', serif);
    font-weight: 900;
    font-size: 160px;
    line-height: 0.95;
    text-align: center;
    letter-spacing: -3px;
  }
  .cta-headline .word {
    display: inline-block;
    opacity: 0;
  }
  .cta-platforms {
    margin-top: 70px;
    display: flex;
    gap: 30px;
    opacity: 0;
  }
  .cta-platform {
    padding: 20px 36px;
    border: 2px solid var(--accent, #7a1f2b);
    border-radius: var(--radius, 8px);
    font-family: var(--font-mono, monospace);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent, #7a1f2b);
  }
  .cta-handle {
    margin-top: 80px;
    font-family: var(--font-mono, monospace);
    font-size: 32px;
    color: var(--fg, #2a1810);
    opacity: 0;
  }

  /* Particles */
  #particles {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .scene > *:not(#particles) { z-index: 2; position: relative; }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- Scene 1: Hook quote -->
<div class="scene" id="scene-quote">
  <div class="quote-mark">"</div>
  <div class="quote-text">
    <span class="word">The</span>
    <span class="word">best</span>
    <span class="word">stories</span>
    <span class="word">aren't</span>
    <span class="word em">told.</span><br>
    <span class="word">They're</span>
    <span class="word em">overheard.</span>
  </div>
  <div class="quote-attr">— every great podcast</div>
</div>

<!-- Scene 2: Show title -->
<div class="scene" id="scene-title">
  <div class="show-eyebrow">// new show</div>
  <h1 class="show-title">
    <span class="word">DEEP</span>
    <span class="word">CUTS</span>
  </h1>
  <p class="show-tagline">Conversations with the people who built the things you use every day.</p>
</div>

<!-- Scene 3: CTA -->
<div class="scene" id="scene-cta">
  <div class="cta-eyebrow">// listen now</div>
  <h1 class="cta-headline">
    <span class="word">EVERY</span>
    <span class="word">TUESDAY.</span>
  </h1>
  <div class="cta-platforms">
    <div class="cta-platform">SPOTIFY</div>
    <div class="cta-platform">APPLE</div>
    <div class="cta-platform">YOUTUBE</div>
  </div>
  <div class="cta-handle">@deepcuts</div>
</div>

<script>
/* ============================================================
   PODCAST PROMO — 3-scene structure, slow editorial pacing
   ============================================================ */

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = 1080; canvas.height = 1920;

const particles = [];

function spawnDust() {
  const style = (window.theme && window.theme.decor && window.theme.decor.particleStyle) || 'none';
  if (style === 'none') return;
  const color = (window.theme && window.theme.decor && window.theme.decor.particleColor) || '#ffffff';
  particles.push({
    x: Math.random() * 1080,
    y: 1920 + 20,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -0.2 - Math.random() * 0.4,
    life: 1,
    decay: 0.0008 + Math.random() * 0.001,
    size: 0.8 + Math.random() * 1.5,
    color
  });
}
for (let i = 0; i < 50; i++) {
  spawnDust();
  if (particles.length) {
    const p = particles[particles.length - 1];
    p.y = Math.random() * 1920;
    p.life = 0.3 + Math.random() * 0.7;
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, 1080, 1920);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0 || p.y < -50) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- Timeline ----
const theme = window.theme || {};
const motion = theme.motion || {};
const ease = motion.defaultEase || 'power2.inOut';
const dur = motion.defaultDuration || 0.8;
const stagger = motion.stagger || 0.15;

const masterTL = gsap.timeline({ paused: true });

// === Scene 1: Quote (0 - 5s) ===
masterTL.set('#scene-quote', { opacity: 1 }, 0);
masterTL.to('#scene-quote .quote-mark', { opacity: 1, duration: dur, ease }, 0.3);
masterTL.to('#scene-quote .word', {
  opacity: 1, y: 0,
  duration: dur, stagger, ease
}, 0.8);
masterTL.to('#scene-quote .quote-attr', { opacity: 1, duration: dur, ease }, 0.8 + 8 * stagger + dur);
masterTL.to({}, { duration: 1.5 }); // hold
masterTL.to('#scene-quote', { opacity: 0, duration: 0.6, ease }, 5.0);

// === Scene 2: Show title (5.6 - 10s) ===
masterTL.set('#scene-title', { opacity: 1 }, 5.6);
masterTL.to('#scene-title .show-eyebrow', { opacity: 1, duration: dur, ease }, 5.8);
masterTL.to('#scene-title .word', {
  opacity: 1, y: 0,
  duration: dur * 1.2, stagger, ease
}, 6.2);
masterTL.to('#scene-title .show-tagline', { opacity: 1, duration: dur, ease }, 6.2 + 3 * stagger + dur * 1.2);
masterTL.to({}, { duration: 1.5 }); // hold
masterTL.to('#scene-title', { opacity: 0, duration: 0.6, ease }, 10.0);

// === Scene 3: CTA (10.6 - 14s) ===
masterTL.set('#scene-cta', { opacity: 1 }, 10.6);
masterTL.to('#scene-cta .cta-eyebrow', { opacity: 1, duration: dur, ease }, 10.8);
masterTL.to('#scene-cta .word', {
  opacity: 1, y: 0,
  duration: dur, stagger, ease
}, 11.2);
masterTL.to('#scene-cta .cta-platforms', {
  opacity: 1, duration: dur, ease
}, 11.2 + 3 * stagger + dur);
masterTL.to('#scene-cta .cta-handle', { opacity: 1, duration: dur, ease }, 11.2 + 3 * stagger + dur * 2);
masterTL.to({}, { duration: 2 }); // hold final

// ---- RENDERER CONTRACT ----
window.masterTL = masterTL;
window.renderMode = (location.hash !== '#live');

window.renderAtTime = function(t) {
  masterTL.seek(t);
  drawParticles();
};

if (!window.renderMode) {
  function liveLoop() {
    drawParticles();
    requestAnimationFrame(liveLoop);
  }
  liveLoop();
  masterTL.play();
}
</script>
</body>
</html>
